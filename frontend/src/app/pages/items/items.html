<div class="container">
  <h2>Artikli</h2>

  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; gap: 1rem;">
    
    <div style="display: flex; align-items: center; gap: 0.5rem;" *ngIf="!showForm">
      <label style="font-weight: 500; color: #555; white-space: nowrap;">Filtriraj po kategoriji:</label>
      <select [(ngModel)]="searchCategoryId" (change)="filterItems()" style="padding: 0.5rem; border-radius: 6px; border: 1px solid #ddd; font-size: 0.9rem;">
        <option value="0">Sve kategorije</option>
        <option *ngFor="let cat of categories" [value]="cat.id">
          {{ cat.name }}
        </option>
      </select>
    </div>

    <button class="btn-success" *ngIf="isAdmin && !showForm" (click)="openCreateForm()" style="margin-left: auto;">
      + Dodaj artikal
    </button>
  </div>

  <div *ngIf="showForm" class="form-card">
    <h3>{{ isEditing ? 'Izmeni artikal' : 'Novi artikal' }}</h3>
    <div>
      <label>Naziv</label>
      <input type="text" [(ngModel)]="selectedItem.name" placeholder="Naziv artikla" />
    </div>
    <div>
      <label>Opis</label>
      <input type="text" [(ngModel)]="selectedItem.description" placeholder="Opis" />
    </div>
    <div>
      <label>Cena</label>
      <input type="number" [(ngModel)]="selectedItem.price" placeholder="0" />
    </div>
    <div>
      <label>Stanje na lageru</label>
      <input type="number" [(ngModel)]="selectedItem.stock" placeholder="0" />
    </div>
    <div>
      <label>Kategorija</label>
      <select [(ngModel)]="selectedCategoryId">
        <option value="0">-- Izaberi kategoriju --</option>
        <option *ngFor="let cat of categories" [value]="cat.id">
          {{ cat.name }}
        </option>
      </select>
    </div>
    <button class="btn-primary" (click)="saveItem()">Sačuvaj</button>
    <button class="btn-secondary" (click)="cancel()">Otkaži</button>
  </div>

  <p *ngIf="!showForm && filteredItems.length === 0" style="text-align: center; margin-top: 2rem; color: #666;">
    Nema artikala za izabranu kategoriju.
  </p>

  <table *ngIf="!showForm && filteredItems.length > 0">
    <thead>
      <tr>
        <th>ID</th>
        <th>Naziv</th>
        <th>Opis</th>
        <th>Cena</th>
        <th>Lager</th>
        <th>Kategorija</th>
        <th *ngIf="isAdmin">Akcije</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of filteredItems">
        <td>{{ item.id }}</td>
        <td>{{ item.name }}</td>
        <td>{{ item.description }}</td>
        <td>{{ item.price }} RSD</td>
        <td>{{ item.stock }}</td>
        <td>{{ item.category?.name }}</td>
        <td *ngIf="isAdmin">
          <button class="btn-warning" (click)="openEditForm(item)">Izmeni</button>
          <button class="btn-danger" (click)="deleteItem(item.id)">Obriši</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
