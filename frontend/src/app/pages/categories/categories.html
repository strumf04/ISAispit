<div class="container">
  <h2>Kategorije</h2>

  <div *ngIf="isLoading">Učitavanje...</div>

  <ng-container *ngIf="!isLoading">
    <button class="btn-success" *ngIf="isAdmin && !showForm" (click)="openCreateForm()">
      + Dodaj kategoriju
    </button>

    <div *ngIf="showForm" class="form-card">
      <h3>{{ isEditing ? 'Izmeni kategoriju' : 'Nova kategorija' }}</h3>
      <div>
        <label>Naziv</label>
        <input type="text" [(ngModel)]="selectedCategory.name" />
      </div>
      <div>
        <label>Opis</label>
        <input type="text" [(ngModel)]="selectedCategory.description" />
      </div>
      <button class="btn-primary" (click)="saveCategory()">Sačuvaj</button>
      <button class="btn-secondary" (click)="cancel()">Otkaži</button>
    </div>

    <div *ngIf="!showForm">
      <p *ngIf="categories.length === 0">Nema kategorija u bazi.</p>
      <table *ngIf="categories.length > 0">
        <thead>
          <tr>
            <th>ID</th>
            <th>Naziv</th>
            <th>Opis</th>
            <th *ngIf="isAdmin">Akcije</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let category of categories; trackBy: trackById">
            <td>{{ category.id }}</td>
            <td>{{ category.name }}</td>
            <td>{{ category.description }}</td>
            <td *ngIf="isAdmin">
              <button class="btn-warning" (click)="openEditForm(category)">Izmeni</button>
              <button class="btn-danger" (click)="deleteCategory(category.id)">Obriši</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </ng-container>
</div>
